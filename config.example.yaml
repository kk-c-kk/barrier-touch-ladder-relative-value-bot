# Copy to config.yaml (gitignored) and edit as needed.

# Underlying assets to discover ladders for. Diversify direction/window/asset to
# dilute the cluster correlation of one-touch wings (one pump hits them together).
assets: [BTC, ETH, SOL, XRP]

# Public, read-only hosts. No API keys needed for the logger.
gamma_host: https://gamma-api.polymarket.com
clob_host: https://clob.polymarket.com
hl_host:   https://api.hyperliquid.xyz

# Snapshot cadence. The book is slow here (multi-day barriers) so 60s is plenty;
# this is NOT a latency game.
poll_interval_s: 60

# Substring (lowercased) matches for touch-ladder event titles. Verify against a
# live /events probe before trusting — Polymarket wording drifts.
event_title_match: ["what price will", "hit", "reach"]

# Gamma /events caps at 100 rows/page; touch ladders span several pages (XRP and
# most daily/weekly ladders sit past page 1). Pages scanned per discovery cycle.
discovery_pages: 6

# Realized-vol estimate: hourly candles over this lookback, annualized.
realized_vol_lookback_h: 168   # 7 days

# SQLite output (gitignored via /data/).
db_path: data/ladders.sqlite

# --- Trader (PAPER by default; live execution is not wired) -------------------
trader_poll_s: 60
min_edge: 0.03          # min |model_fair - price| (prob units) to act on a rung
base_size: 100          # shares at exactly min_edge; scales linearly above it
max_ticket: 500         # share cap per single leg
max_cluster_risk: 2000  # max worst-case USD per (asset, expiry, side) cluster
# ValidationGate: the trader refuses to size until the resolved data shows a
# statistically significant edge over >= this many deduped trials.
min_validation_n: 100

# --- Web dashboard reporting (optional) ---------------------------------------
# Reports to the central quant web reporter so the bot shows up in its dropdown.
# Entirely optional: if enabled=false (or this block is removed) the bot runs
# unchanged. The logger has no trades/PnL by design, so it shows as an online dot
# + a live headline-asset price line; the paper trader also reports trades/skips.
# The ingest API key (if the reporter service sets REPORTER_API_KEY) is read from
# the bot's OWN env var REPORTER_API_KEY — never put it in this file.
reporter:
  enabled: false
  base_url: http://127.0.0.1:8000   # same VPS as the reporter service
  bot_id: touch-ladder-logger       # unique key = the dashboard dropdown entry
  name: Touch-Ladder Logger
  headline_asset: BTC               # which asset's spot drives the price chart
  heartbeat_s: 10                   # < the dashboard's 20s offline window
